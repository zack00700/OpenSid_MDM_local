# ═══════════════════════════════════════════════════
# O.S MDM V2 — CI/CD Pipeline
# Se déclenche à chaque push et pull request
# ═══════════════════════════════════════════════════

name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── TESTS ────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lancer les tests
        env:
          MDM_SECRET: ci-test-secret-key-for-github-actions
          MDM_CORS_ORIGINS: '*'
        run: |
          pytest tests/ -v --tb=short --cov=backend --cov-report=xml

      - name: Upload couverture
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── LINT ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Vérification syntaxe
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/maritime.py
          python -m py_compile frontend/server.py
          echo "✅ Tous les fichiers Python compilent correctement"

  # ── DOCKER BUILD ─────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t osmdm:${{ github.sha }} .

      - name: Test Docker health
        run: |
          docker run -d --name osmdm-test -p 5001:5001 -p 3000:3000 \
            -e MDM_SECRET=docker-test-secret osmdm:${{ github.sha }}
          sleep 8
          curl -f http://localhost:5001/api/health || (docker logs osmdm-test && exit 1)
          docker stop osmdm-test
          echo "✅ Docker health check OK"
